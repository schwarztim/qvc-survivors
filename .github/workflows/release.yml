name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            pkg-type: msi
            artifact-ext: msi
          - os: ubuntu-latest
            pkg-type: deb
            artifact-ext: deb
          - os: macos-latest
            pkg-type: dmg
            artifact-ext: dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install WiX Toolset (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install wixtoolset -y
        shell: pwsh

      - name: Install fakeroot (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y fakeroot

      - name: Build fat JAR
        run: mvn package -Pcross-platform -q

      - name: Locate shaded JAR
        id: jar
        run: |
          JAR=$(ls target/QVCSurvivors-*.jar | grep -v original | head -1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $JAR)" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Determine app version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Build native package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p dist
          jpackage \
            --type msi \
            --name "QVC Survivors" \
            --app-version "${{ steps.version.outputs.value }}" \
            --vendor "QVC Retail Group" \
            --description "A QVC-themed Vampire Survivors clone" \
            --input target/ \
            --main-jar "${{ steps.jar.outputs.name }}" \
            --main-class com.qvc.survivors.Launcher \
            --dest dist/ \
            --java-options "-Xmx512m" \
            --icon QVCSurvivors.ico \
            --win-shortcut \
            --win-menu
        shell: bash

      - name: Build native package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          jpackage \
            --type deb \
            --name "qvc-survivors" \
            --app-version "${{ steps.version.outputs.value }}" \
            --vendor "QVC Retail Group" \
            --description "A QVC-themed Vampire Survivors clone" \
            --input target/ \
            --main-jar "${{ steps.jar.outputs.name }}" \
            --main-class com.qvc.survivors.Launcher \
            --dest dist/ \
            --java-options "-Xmx512m" \
            --linux-shortcut

      - name: Build native package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist
          jpackage \
            --type dmg \
            --name "QVC Survivors" \
            --app-version "${{ steps.version.outputs.value }}" \
            --vendor "QVC Retail Group" \
            --description "A QVC-themed Vampire Survivors clone" \
            --input target/ \
            --main-jar "${{ steps.jar.outputs.name }}" \
            --main-class com.qvc.survivors.Launcher \
            --dest dist/ \
            --java-options "-Xmx512m"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QVCSurvivors-${{ matrix.os }}
          path: dist/*.${{ matrix.artifact-ext }}

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.${{ matrix.artifact-ext }}
